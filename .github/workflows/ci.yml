name: ci

on:
  push:
  pull_request:

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libglfw3-dev libgl-dev librtlsdr-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DNEVINS_BUILD_TESTS=ON -DNEVINS_BUILD_GUI=ON -DNEVINS_ENABLE_RTLSDR=OFF
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
